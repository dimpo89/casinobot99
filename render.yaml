services:
  - type: web
    name: telegram-casino-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_IDS
        value: 123456789
      - key: PYTHON_VERSION
        value: 3.13.4
